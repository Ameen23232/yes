<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام العملاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cairo';
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen {
  display:none;
  width:90%;
  max-width:400px;
  text-align:center;
}

.active {display:block;}

button {
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  background:#8a2be2;
  color:white;
  font-size:16px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="screen active">
  <h2>👋 مرحبًا</h2>
  <button onclick="go('add')">➕ إضافة بيانات</button>
  <button onclick="go('search')">🔍 البحث برقم الهاتف</button>
</div>

<!-- إضافة -->
<div id="add" class="screen">
  <h3>إضافة عميل</h3>
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="address" placeholder="العنوان">
  <button onclick="save()">حفظ</button>
  <button onclick="go('home')">رجوع</button>
</div>

<!-- نجاح -->
<div id="success" class="screen">
  <h2>تم الإرسال ✅</h2>
  <button onclick="location.reload()">➕ إدخال جديد</button>
</div>

<!-- البحث -->
<div id="search" class="screen">
  <h3>بحث برقم الهاتف</h3>

  <input id="searchPhone" placeholder="اكتب رقم الهاتف">
  <button onclick="find()">بحث</button>

  <div id="statusBox" style="margin-top:30px;font-size:22px;"></div>

  <button id="editBtn" style="display:none;" onclick="enableEdit()">تعديل الحالة</button>

  <div id="editArea" style="display:none;">
    <input id="newStatus" placeholder="اكتب حالة الطلب">
    <button onclick="updateStatus()">تأكيد التعديل</button>
  </div>

  <button onclick="go('home')">رجوع</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz92hIYcnD07tF2PBQYSBRgwy8xh4G3XHBhVr7ez3soEA3O19mM_uH1Kff8FIygprL3/exec";

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* إضافة */
async function save(){
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
  });

  go("success");
}

/* البحث */
let currentRow = null;

async function find(){
  const phone = document.getElementById("searchPhone").value;

  const res = await fetch(API + "?phone=" + phone);
  const data = await res.json();

  const box = document.getElementById("statusBox");

  if(data.error){
    box.innerHTML = "❌ الرقم غير موجود";
    document.getElementById("editBtn").style.display = "none";
    return;
  }

  currentRow = data.row;

  box.innerHTML = data.status 
    ? "📦 " + data.status 
    : "لا توجد حالة بعد";

  document.getElementById("editBtn").style.display = "block";
}

/* تفعيل التعديل */
function enableEdit(){
  document.getElementById("editArea").style.display = "block";
}

/* تحديث الحالة */
async function updateStatus(){
  const status = document.getElementById("newStatus").value;

  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      update:true,
      row:currentRow,
      status:status
    })
  });

  alert("تم التحديث ✅");
  location.reload();
}
</script>

</body>
</html>
