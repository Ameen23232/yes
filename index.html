<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشحن الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent: #38bdf8;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px;
        }
        .main-container {
            background: var(--card-dark);
            border-radius: 28px;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%; max-width: 420px; padding: 30px;
        }
        .input-style {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            border-radius: 14px;
            padding: 14px; width: 100%; margin-bottom: 15px;
            outline: none; transition: 0.3s ease;
        }
        .input-style:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            font-weight: 800;
            padding: 16px; border-radius: 14px;
            width: 100%; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        .type-selector {
            background: #334155; padding: 12px; border-radius: 12px;
            flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent;
            transition: 0.3s; font-size: 14px; color: #94a3b8;
        }
        .active-type { border-color: var(--accent); background: #0f172a; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="step1">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-sky-400">مرحباً بك</h2>
                <p class="text-slate-400 text-sm mt-2">أدخل بريدك الإلكتروني لتلقي رمز الدخول</p>
            </div>
            <input type="email" id="uEmail" placeholder="example@gmail.com" class="input-style text-center">
            <button onclick="sendOTP()" id="sendBtn" class="btn-primary">إرسال كود التحقق</button>
        </div>

        <div id="step2" class="hidden text-center">
            <h2 class="text-xl font-bold mb-2">تأكيد الرمز</h2>
            <p class="text-slate-400 text-sm mb-6">أدخل الكود المكون من 4 أرقام المرسل لبريدك</p>
            <input type="number" id="otpInp" placeholder="0 0 0 0" class="input-style text-center text-3xl tracking-[0.4em]">
            <button onclick="verifyOTP()" class="btn-primary">تحقق ودخول</button>
            <button onclick="location.reload()" class="mt-4 text-xs text-slate-500 underline">تغيير البريد</button>
        </div>

        <div id="step3" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="mailBadge" class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full text-xs font-bold"></span>
                <span class="text-slate-500 text-xs italic">طلب جديد</span>
            </div>
            
            <div class="space-y-1">
                <input id="rName" type="text" placeholder="اسم المستلم" class="input-style">
                <input id="rPhone" type="tel" placeholder="رقم الموبايل" class="input-style">
                
                <select id="gov" onchange="loadCities()" class="input-style">
                    <option value="">اختر المحافظة</option>
                </select>
                <select id="city" class="input-style">
                    <option value="">اختر المدينة</option>
                </select>

                <div class="flex gap-3 mb-6">
                    <div id="t1" onclick="setType('شحن عادي', 't1')" class="type-selector active-type">شحن عادي</div>
                    <div id="t2" onclick="setType('استبدال', 't2')" class="type-selector">استبدال</div>
                </div>

                <button onclick="submitOrder()" id="finalBtn" class="btn-primary">تأكيد الأوردر</button>
            </div>
        </div>
    </div>

    <script>
        // رابط الشيت الأول الخاص بك (المستقبل)
        const API_URL = "https://script.google.com/macros/s/AKfycbzRSHo4OR9pA1rnFwJXUBZrthJOWLmAuOLyoP2oxMJtaXR-f4-Cc7k9Pffj9JbprzoPDg/exec";
        
        let clientEmail = "", serverOTP = "", selectedType = "شحن عادي";

        // قاعدة بيانات المحافظات والمدن
        const egyptMap = {
            "القاهرة": ["المعادي", "حلوان", "مدينة نصر", "مصر الجديدة", "وسط البلد", "التجمع الخامس", "شبرا"],
            "الجيزة": ["الهرم", "الدقي", "6 أكتوبر", "الشيخ زايد", "فيصل", "العجوزة"],
            "الإسكندرية": ["سموحة", "المنتزة", "محرم بك", "العجمي", "سيدي جابر", "ميامي"],
            "البحيرة": ["دمنهور", "كفر الدوار", "إيتاي البارود", "كوم حمادة", "أبو حمص", "رشيد"],
            "الغربية": ["طنطا", "المحلة الكبرى", "كفر الزيات", "بسيون"],
            "الدقهلية": ["المنصورة", "طلخا", "ميت غمر", "السنبلاوين"],
            "الشرقية": ["الزقازيق", "العاشر من رمضان", "بلبيس", "منيا القمح"],
            "المنوفية": ["شبين الكوم", "قويسنا", "أشمون", "منوف"],
            "القليوبية": ["بنها", "شبرا الخيمة", "العبور", "قليوب"],
            "كفر الشيخ": ["كفر الشيخ", "دسوق", "فوه"],
            "دمياط": ["دمياط", "دمياط الجديدة", "رأس البر"],
            "الفيوم": ["الفيوم", "إطسا"],
            "بني سويف": ["بني سويف", "الواسطى"],
            "المنيا": ["المنيا", "ملوي", "مغاغة"],
            "أسيوط": ["أسيوط", "ديروط"],
            "سوهاج": ["سوهاج", "طما"],
            "قنا": ["قنا", "نجع حمادي"],
            "الأقصر": ["الأقصر", "إسنا"],
            "أسوان": ["أسوان", "إدفو"],
            "مطروح": ["مرسى مطروح", "العلمين"],
            "البحر الأحمر": ["الغردقة", "سفاجا"],
            "الإسماعيلية": ["الإسماعيلية", "فايد"]
        };

        window.onload = () => {
            const g = document.getElementById('gov');
            Object.keys(egyptMap).sort().forEach(k => g.innerHTML += `<option value="${k}">${k}</option>`);
        };

        function loadCities() {
            const g = document.getElementById('gov').value;
            const c = document.getElementById('city');
            c.innerHTML = '<option value="">اختر المدينة</option>';
            if(egyptMap[g]) egyptMap[g].forEach(item => c.innerHTML += `<option value="${item}">${item}</option>`);
        }

        function sendOTP() {
            clientEmail = document.getElementById('uEmail').value;
            if(!clientEmail.includes("@")) return alert("البريد الإلكتروني غير صحيح");
            
            serverOTP = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('sendBtn').innerText = "جاري الإرسال...";
            
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "sendOTP", email: clientEmail, otp: serverOTP })
            }).then(() => {
                alert("تم إرسال كود التحقق لبريدك الإلكتروني.");
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            });
        }

        function verifyOTP() {
            if(document.getElementById('otpInp').value == serverOTP) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('mailBadge').innerText = clientEmail;
            } else { alert("الكود غير صحيح!"); }
        }

        function setType(v, id) {
            selectedType = v;
            document.getElementById('t1').className = 'type-selector';
            document.getElementById('t2').className = 'type-selector';
            document.getElementById(id).classList.add('active-type');
        }

        function submitOrder() {
            const btn = document.getElementById('finalBtn');
            btn.innerText = "جاري التأكيد..."; btn.disabled = true;
            
            const payload = {
                email: clientEmail,
                name: document.getElementById('rName').value,
                rPhone: document.getElementById('rPhone').value,
                gov: document.getElementById('gov').value,
                city: document.getElementById('city').value,
                type: selectedType
            };

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                alert("تم بنجاح! سيتم معالجة طلبك خلال لحظات.");
                location.reload();
            }).catch(() => {
                alert("حدث خطأ، حاول مرة أخرى.");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
