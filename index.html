<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشحن الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .card { 
            background: #1e293b; border-radius: 24px; border: 1px solid #334155; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%; max-width: 400px; padding: 30px; 
        }
        .input-field { 
            background: #334155; border: 1px solid #475569; color: white; 
            border-radius: 12px; padding: 14px; width: 100%; margin-bottom: 15px; 
            outline: none; transition: 0.3s; text-align: center;
        }
        .input-field:focus { border-color: #38bdf8; }
        .btn { 
            background: #38bdf8; color: #0f172a; font-weight: bold; 
            padding: 16px; border-radius: 12px; width: 100%; 
            cursor: pointer; border: none; transition: 0.2s; 
        }
        .btn:active { transform: scale(0.97); }
        .hidden { display: none !important; }
        .type-pill { 
            background: #334155; padding: 10px; border-radius: 10px; 
            flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; 
        }
        .active-pill { border-color: #38bdf8; background: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h2 class="text-2xl font-bold text-center mb-6 text-sky-400">دخول العميل</h2>
            <input type="email" id="uEmail" placeholder="your-email@example.com" class="input-field">
            <button onclick="sendOTP()" id="sendBtn" class="btn">إرسال كود التحقق</button>
        </div>

        <div id="step2" class="hidden">
            <h2 class="text-xl font-bold text-center mb-4">أدخل الكود</h2>
            <p class="text-slate-400 text-sm text-center mb-4">تفقد بريدك الإلكتروني الآن</p>
            <input type="number" id="otpInp" placeholder="0 0 0 0" class="input-field text-2xl tracking-[0.5em]">
            <button onclick="verifyOTP()" class="btn">تأكيد الرمز</button>
        </div>

        <div id="step3" class="hidden">
            <h3 id="userMail" class="text-xs text-sky-400 mb-4 font-bold"></h3>
            <input id="rName" type="text" placeholder="اسم المستلم" class="input-field text-right">
            <input id="rPhone" type="tel" placeholder="رقم هاتف المستلم" class="input-field text-right">
            
            <select id="gov" onchange="loadCities()" class="input-field text-right">
                <option value="">اختر المحافظة</option>
            </select>
            <select id="city" class="input-field text-right">
                <option value="">اختر المدينة</option>
            </select>

            <div class="flex gap-2 mb-4">
                <div id="t1" onclick="selectT('عادي', 't1')" class="type-pill active-pill">شحن عادي</div>
                <div id="t2" onclick="selectT('استبدال', 't2')" class="type-pill">استبدال أوردر</div>
            </div>

            <button onclick="finish()" id="finishBtn" class="btn">تأكيد الأوردر</button>
        </div>
    </div>

    <script>
        // رابط الـ API الجديد الذي أرسلته
        const API_URL = "https://script.google.com/macros/s/AKfycbzOm1XtbQemWZG6JToVPnIzfui3wQAF81bfCF8_iDHGcP64RcDvHpZplD3DMYH427fHlQ/exec";
        
        let clientMail = "", currentOTP = "", finalType = "عادي";

        const egypt = {
            "القاهرة": ["المعادي", "التجمع", "مدينة نصر", "وسط البلد"],
            "الجيزة": ["أكتوبر", "الشيخ زايد", "الهرم", "الدقي"],
            "الإسكندرية": ["سموحة", "ميامي", "محرم بك"],
            "البحيرة": ["دمنهور", "كفر الدوار", "كوم حمادة"]
        };

        window.onload = () => {
            const g = document.getElementById('gov');
            Object.keys(egypt).sort().forEach(k => g.innerHTML += `<option value="${k}">${k}</option>`);
        };

        function loadCities() {
            const g = document.getElementById('gov').value;
            const c = document.getElementById('city');
            c.innerHTML = '<option value="">اختر المدينة</option>';
            if(egypt[g]) egypt[g].forEach(item => c.innerHTML += `<option value="${item}">${item}</option>`);
        }

        function sendOTP() {
            clientMail = document.getElementById('uEmail').value;
            if(!clientMail.includes("@")) return alert("البريد غير صحيح");
            
            currentOTP = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('sendBtn').innerText = "جاري الإرسال...";
            
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "sendOTP", email: clientMail, otp: currentOTP })
            }).then(() => {
                alert("تحقق من بريدك الإلكتروني الآن!");
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            });
        }

        function verifyOTP() {
            if(document.getElementById('otpInp').value == currentOTP) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('userMail').innerText = clientMail;
            } else { alert("الكود خطأ!"); }
        }

        function selectT(v, id) {
            finalType = v;
            document.getElementById('t1').classList.remove('active-pill');
            document.getElementById('t2').classList.remove('active-pill');
            document.getElementById(id).classList.add('active-pill');
        }

        function finish() {
            const btn = document.getElementById('finishBtn');
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;
            
            const data = {
                email: clientMail,
                name: document.getElementById('rName').value,
                rPhone: document.getElementById('rPhone').value,
                gov: document.getElementById('gov').value,
                city: document.getElementById('city').value,
                type: finalType
            };

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            }).then(() => {
                alert("تم تسجيل طلبك بنجاح!");
                location.reload();
            });
        }
    </script>
</body>
</html>
