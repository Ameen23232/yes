<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشحن الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px; padding: 30px; }
        .input-style { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 14px; width: 100%; margin-bottom: 15px; outline: none; transition: 0.3s; text-align: center; }
        .btn { background: #38bdf8; color: #0f172a; font-weight: bold; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; border: none; transition: 0.2s; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h2 class="text-2xl font-bold text-center mb-6 text-sky-400">تسجيل الدخول</h2>
            <input type="email" id="uEmail" placeholder="بريدك الإلكتروني" class="input-style">
            <button onclick="sendOTP()" id="sendBtn" class="btn">إرسال كود التحقق</button>
        </div>

        <div id="step2" class="hidden">
            <h2 class="text-xl font-bold text-center mb-4">أدخل الرمز</h2>
            <p class="text-slate-400 text-sm text-center mb-4">تفقد بريدك الإلكتروني (بما في ذلك الـ Spam)</p>
            <input type="number" id="otpInp" placeholder="0 0 0 0" class="input-style text-2xl tracking-[0.5em]">
            <button onclick="verifyOTP()" class="btn">دخول</button>
        </div>

        <div id="step3" class="hidden">
            <p class="text-xs text-sky-400 mb-4" id="loggedUser"></p>
            <input id="rName" type="text" placeholder="اسم المستلم" class="input-style">
            <input id="rPhone" type="tel" placeholder="رقم هاتف المستلم" class="input-style">
            <button onclick="submitFinalOrder()" id="finalBtn" class="btn">تأكيد الأوردر</button>
        </div>
    </div>

    <script>
        // رابط Formspree الخاص بك
        const FORMSPREE_URL = "https://formspree.io/f/mbdpgong";
        // رابط الشيت الأول الخاص بك (لحفظ البيانات)
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbzOm1XtbQemWZG6JToVPnIzfui3wQAF81bfCF8_iDHGcP64RcDvHpZplD3DMYH427fHlQ/exec";

        let userMail = "", generatedOTP = "";

        async function sendOTP() {
            userMail = document.getElementById('uEmail').value;
            if(!userMail.includes("@")) return alert("يرجى إدخال إيميل صحيح");

            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            // إرسال الكود عبر Formspree
            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userMail,
                        message: `كود التحقق الخاص بك للدخول هو: ${generatedOTP}`
                    })
                });

                if (response.ok) {
                    alert("تم إرسال الكود! تفقد إيميلك الآن.");
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    alert("خطأ في الخدمة، حاول لاحقاً.");
                    btn.disabled = false;
                    btn.innerText = "إرسال كود التحقق";
                }
            } catch (err) {
                alert("حدث خطأ في الاتصال.");
                btn.disabled = false;
            }
        }

        function verifyOTP() {
            const input = document.getElementById('otpInp').value;
            if(input == generatedOTP) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('loggedUser').innerText = "مسجل بـ: " + userMail;
            } else {
                alert("الكود غير صحيح!");
            }
        }

        async function submitFinalOrder() {
            const btn = document.getElementById('finalBtn');
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;

            const data = {
                email: userMail,
                name: document.getElementById('rName').value,
                rPhone: document.getElementById('rPhone').value,
                action: "saveOrder" // لتمييز الطلب في الشيت
            };

            fetch(SHEET_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            }).then(() => {
                alert("تم تسجيل الأوردر بنجاح!");
                location.reload();
            });
        }
    </script>
</body>
</html>
