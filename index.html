<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الشحن المحترف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --accent-blue: #0A84FF;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dark-card {
            background: var(--card-dark);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .ios-input {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }
        .ios-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.15); }
        .btn-primary {
            background: var(--accent-blue);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 16px;
            transition: 0.3s;
            width: 100%;
        }
        .btn-primary:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .type-card {
            background: #2c2c2e;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            flex: 1;
        }
        .type-active { border-color: var(--accent-blue); background: rgba(10, 132, 255, 0.1); }
    </style>
</head>
<body class="p-4">

    <div id="app" class="w-full max-w-md dark-card p-8">
        
        <div id="loginSection">
            <h1 class="text-3xl font-bold mb-2 text-center">تسجيل الدخول</h1>
            <p class="text-center text-gray-400 mb-8">أدخل رقم هاتفك لاستلام كود التحقق</p>
            <input type="tel" id="uPhone" placeholder="01xxxxxxxxx" class="ios-input mb-4 text-center text-xl">
            <button onclick="requestOTP()" id="otpBtn" class="btn-primary">إرسال كود التحقق</button>
        </div>

        <div id="verifySection" class="hidden text-center">
            <h1 class="text-2xl font-bold mb-6">أدخل الكود</h1>
            <div class="flex justify-center gap-2 mb-8" dir="ltr">
                <input type="number" id="vCode" placeholder="••••" class="ios-input text-center text-2xl tracking-widest w-40">
            </div>
            <button onclick="verifyOTP()" class="btn-primary">تحقق ودخول</button>
        </div>

        <div id="formSection" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">بيانات الشحنة</h2>
                <span class="text-blue-400 text-sm" id="userDisplay"></span>
            </div>
            
            <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2" id="scrollArea">
                <input id="rName" type="text" placeholder="اسم المستلم" class="ios-input">
                <input id="rPhone" type="tel" placeholder="رقم المستلم" class="ios-input">
                
                <select id="govSelect" onchange="updateCities()" class="ios-input">
                    <option value="">اختر المحافظة</option>
                </select>

                <select id="citySelect" class="ios-input">
                    <option value="">اختر المدينة</option>
                </select>

                <input id="address" type="text" placeholder="العنوان بالتفصيل" class="ios-input">
                
                <div class="flex gap-2">
                    <input id="weight" type="number" placeholder="الوزن" class="ios-input">
                    <input id="price" type="number" placeholder="السعر" class="ios-input">
                </div>

                <div class="flex gap-3">
                    <div id="t1" onclick="setType('عادي', 't1')" class="type-card">شحن عادي</div>
                    <div id="t2" onclick="setType('استبدال', 't2')" class="type-card">استبدال</div>
                </div>
            </div>
            
            <button onclick="sendToSheet()" id="sendBtn" class="btn-primary mt-6">تأكيد الأوردر</button>
        </div>

    </div>

    <script>
        // بيانات المحافظات والمدن (مدمجة للسرعة القصوى)
        const data = {
            "القاهرة": ["المعادي", "حلوان", "مدينة نصر", "مصر الجديدة"],
            "الجيزة": ["الهرم", "الدقي", "أكتوبر", "الشيخ زايد"],
            "الإسكندرية": ["سموحة", "المنتزة", "محرم بك"],
            "البحيرة": ["دمنهور", "كفر الدوار", "كوم حمادة"]
            // يمكنك إضافة الباقي هنا بنفس النمط
        };

        let currentType = "";
        let generatedOTP = "";
        const scriptURL = "رابط_API_الشيت_الأول_هنا"; // ضع رابط Web App الخاص بشيت 1

        window.onload = () => {
            const govS = document.getElementById('govSelect');
            Object.keys(data).forEach(g => govS.innerHTML += `<option value="${g}">${g}</option>`);
        };

        function updateCities() {
            const g = document.getElementById('govSelect').value;
            const cS = document.getElementById('citySelect');
            cS.innerHTML = '<option value="">اختر المدينة</option>';
            if(data[g]) data[g].forEach(c => cS.innerHTML += `<option value="${c}">${c}</option>`);
        }

        function setType(val, id) {
            currentType = val;
            document.getElementById('t1').className = 'type-card';
            document.getElementById('t2').className = 'type-card';
            document.getElementById(id).classList.add('type-active');
        }

        // نظام OTP
        function requestOTP() {
            const p = document.getElementById('uPhone').value;
            if(p.length < 10) return alert("رقم خطأ");
            
            // توليد كود وهمي حالياً (يمكن ربطه بـ Twilio لاحقاً)
            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            alert("كود التحقق الخاص بك هو: " + generatedOTP); // محاكاة للإرسال
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('verifySection').classList.remove('hidden');
        }

        function verifyOTP() {
            if(document.getElementById('vCode').value == generatedOTP) {
                document.getElementById('verifySection').classList.add('hidden');
                document.getElementById('formSection').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = document.getElementById('uPhone').value;
            } else {
                alert("كود خاطئ");
            }
        }

        function sendToSheet() {
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const payload = {
                phone: document.getElementById('uPhone').value,
                name: document.getElementById('rName').value,
                rPhone: document.getElementById('rPhone').value,
                gov: document.getElementById('govSelect').value,
                city: document.getElementById('citySelect').value,
                type: currentType
            };

            // إرسال البيانات باستخدام Fetch (متوافق مع GitHub)
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // لتجنب مشاكل الـ CORS
                cache: 'no-cache',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("تم التسجيل بنجاح!");
                location.reload();
            }).catch(e => alert("خطأ: " + e));
        }
    </script>
</body>
</html>
