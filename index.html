<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام العملاء</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600&display=swap');

body {
  margin:0;
  font-family:'SF Pro Display', sans-serif;
  background:linear-gradient(135deg,#0a0a0a,#111);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen {
  display:none;
  width:90%;
  max-width:400px;
  text-align:center;
}

.active {display:block;}

h2,h3 {
  margin-bottom:20px;
}

/* Glass effect */
.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(138,43,226,0.2);
}

/* Inputs */
input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:15px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

/* Buttons */
button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:20px;
  background:linear-gradient(145deg,#8a2be2,#6a1bd1);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px rgba(138,43,226,0.4);
}

button:hover {
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(138,43,226,0.8);
}

button:active {
  transform:scale(0.97);
}

/* Status text */
#statusBox {
  margin-top:25px;
  font-size:22px;
  font-weight:600;
}

/* Neon glow under buttons */
button::after {
  content:'';
  display:block;
  height:3px;
  width:60%;
  margin:8px auto 0;
  background:#8a2be2;
  filter:blur(6px);
  opacity:0.6;
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="screen active card">
  <h2>👋 مرحبًا</h2>
  <button onclick="go('add')">➕ إضافة بيانات</button>
  <button onclick="go('search')">🔍 البحث</button>
</div>

<!-- إضافة -->
<div id="add" class="screen card">
  <h3>إضافة عميل</h3>
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="address" placeholder="العنوان">
  <button onclick="save()">حفظ</button>
  <button onclick="go('home')">رجوع</button>
</div>

<!-- نجاح -->
<div id="success" class="screen card">
  <h2>تم الإرسال ✅</h2>
  <button onclick="location.reload()">➕ إدخال جديد</button>
</div>

<!-- البحث -->
<div id="search" class="screen card">
  <h3>بحث برقم الهاتف</h3>

  <input id="searchPhone" placeholder="رقم الهاتف">
  <button onclick="find()">بحث</button>

  <div id="statusBox"></div>

  <button id="editBtn" style="display:none;" onclick="askPassword()">تعديل الحالة</button>

  <div id="passwordBox" style="display:none;">
    <input id="password" type="password" placeholder="كلمة المرور">
    <button onclick="checkPassword()">تأكيد</button>
  </div>

  <div id="editArea" style="display:none;">
    <input id="newStatus" placeholder="اكتب حالة الطلب">
    <button onclick="updateStatus()">حفظ التعديل</button>
  </div>

  <button onclick="go('home')">رجوع</button>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz3QPyk9a65_uABv_fNKISMTggIYkISchMiUIRJoYrGlhm0mnkJZ-qwlIQlbCbOGNx_/exec";

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* إضافة */
async function save(){
  const data = {
    name: name.value,
    phone: phone.value,
    address: address.value
  };

  await fetch(API,{method:"POST",mode:"no-cors",body:JSON.stringify(data)});
  go("success");
}

/* البحث */
let currentRow=null;

async function find(){
  const phoneVal = searchPhone.value;

  const res = await fetch(API+"?phone="+phoneVal);
  const data = await res.json();

  if(data.error){
    statusBox.innerHTML="❌ غير موجود";
    return;
  }

  currentRow=data.row;

  statusBox.innerHTML = data.status ? "📦 "+data.status : "لا توجد حالة";

  editBtn.style.display="block";
}

/* طلب كلمة المرور */
function askPassword(){
  passwordBox.style.display="block";
}

/* تحقق كلمة المرور */
function checkPassword(){
  if(password.value==="Admin"){
    editArea.style.display="block";
    passwordBox.style.display="none";
  }else{
    alert("❌ كلمة المرور خاطئة");
  }
}

/* تحديث */
async function updateStatus(){
  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      update:true,
      row:currentRow,
      status:newStatus.value
    })
  });

  alert("تم التحديث ✅");
  location.reload();
}
</script>

</body>
</html>
