<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشحن الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: #1e293b; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); width: 100%; max-width: 400px; padding: 30px; }
        .input-style { background: #334155; border: 1px solid #475569; color: white; border-radius: 12px; padding: 14px; width: 100%; margin-bottom: 15px; outline: none; transition: 0.3s; text-align: center; }
        .input-style:focus { border-color: #38bdf8; }
        .btn { background: #38bdf8; color: #0f172a; font-weight: bold; padding: 16px; border-radius: 12px; width: 100%; cursor: pointer; border: none; transition: 0.2s; }
        .btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
        .hidden { display: none !important; }
        .type-pill { background: #334155; padding: 10px; border-radius: 10px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .active-pill { border-color: #38bdf8; background: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h2 class="text-2xl font-bold text-center mb-6 text-sky-400">بوابة الشحن</h2>
            <p class="text-slate-400 text-sm text-center mb-4">أدخل بريدك لتلقي رمز التحقق</p>
            <input type="email" id="uEmail" placeholder="your-email@example.com" class="input-style">
            <button onclick="sendOTP()" id="sendBtn" class="btn">إرسال كود التحقق</button>
        </div>

        <div id="step2" class="hidden">
            <h2 class="text-xl font-bold text-center mb-4">تأكيد الرمز</h2>
            <p class="text-slate-400 text-sm text-center mb-4">تم إرسال الكود لبريدك الإلكتروني</p>
            <input type="number" id="otpInp" placeholder="0 0 0 0" class="input-style text-2xl tracking-[0.5em]">
            <button onclick="verifyOTP()" class="btn">تأكيد الدخول</button>
        </div>

        <div id="step3" class="hidden">
            <div class="mb-4 text-center">
                <span id="userBadge" class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full text-xs"></span>
            </div>
            <input id="rName" type="text" placeholder="اسم المستلم" class="input-style">
            <input id="rPhone" type="tel" placeholder="رقم موبايل المستلم" class="input-style">
            
            <select id="gov" onchange="loadCities()" class="input-style text-right">
                <option value="">اختر المحافظة</option>
            </select>
            <select id="city" class="input-style text-right">
                <option value="">اختر المدينة</option>
            </select>

            <div class="flex gap-2 mb-4">
                <div id="t1" onclick="selectType('عادي', 't1')" class="type-pill active-pill">شحن عادي</div>
                <div id="t2" onclick="selectType('استبدال', 't2')" class="type-pill">استبدال</div>
            </div>

            <button onclick="submitOrder()" id="finalBtn" class="btn">تأكيد الطلب النهائي</button>
        </div>
    </div>

    <script>
        // الروابط الخاصة بك
        const FORMSPREE_URL = "https://formspree.io/f/mbdpgong";
        const SHEET_API = "https://script.google.com/macros/s/AKfycbx9e_jTtOgIYM7-eMegfAGZH7pYKXqJMn0KmeHw5uWt0AYzzjRyXtA1w1fJlJn_dK6Png/exec";
        
        let userMail = "", generatedOTP = "", finalType = "عادي";

        const egyptData = {
            "القاهرة": ["المعادي", "التجمع", "مدينة نصر", "وسط البلد"],
            "الجيزة": ["أكتوبر", "الشيخ زايد", "الهرم", "فيصل"],
            "البحيرة": ["دمنهور", "كفر الدوار", "أبو حمص"]
        };

        window.onload = () => {
            const g = document.getElementById('gov');
            Object.keys(egyptData).sort().forEach(k => g.innerHTML += `<option value="${k}">${k}</option>`);
        };

        function loadCities() {
            const g = document.getElementById('gov').value;
            const c = document.getElementById('city');
            c.innerHTML = '<option value="">اختر المدينة</option>';
            if(egyptData[g]) egyptData[g].forEach(item => c.innerHTML += `<option value="${item}">${item}</option>`);
        }

        async function sendOTP() {
            userMail = document.getElementById('uEmail').value;
            if(!userMail.includes("@")) return alert("البريد غير صحيح");

            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري الإرسال..."; btn.disabled = true;

            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userMail, message: `كود التحقق الخاص بك هو: ${generatedOTP}` })
                });

                if (response.ok) {
                    alert("تم إرسال الكود بنجاح! تفقد بريدك.");
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    alert("فشل في الإرسال، تأكد من تفعيل حساب Formspree.");
                    btn.disabled = false; btn.innerText = "إرسال كود التحقق";
                }
            } catch (e) { alert("خطأ في الاتصال"); btn.disabled = false; }
        }

        function verifyOTP() {
            if(document.getElementById('otpInp').value == generatedOTP) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('userBadge').innerText = userMail;
            } else { alert("الكود خطأ!"); }
        }

        function selectType(v, id) {
            finalType = v;
            document.getElementById('t1').classList.remove('active-pill');
            document.getElementById('t2').classList.remove('active-pill');
            document.getElementById(id).classList.add('active-pill');
        }

        function submitOrder() {
            const btn = document.getElementById('finalBtn');
            btn.innerText = "جاري الحفظ..."; btn.disabled = true;
            
            const payload = {
                email: userMail,
                name: document.getElementById('rName').value,
                rPhone: document.getElementById('rPhone').value,
                gov: document.getElementById('gov').value,
                city: document.getElementById('city').value,
                type: finalType
            };

            fetch(SHEET_API, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                alert("شكراً لك! تم تسجيل الأوردر بنجاح.");
                location.reload();
            }).catch(() => {
                alert("خطأ في الحفظ");
                btn.disabled = false;
            });
        }
    </script>
</body>
    </html>
