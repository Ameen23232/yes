<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0a0a0a, #1c1c1c);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  color: white;
}

#welcome {
  font-size: 3.5rem;
  opacity: 0;
  transform: scale(0.9);
  animation: fadeScale 2.5s ease forwards;
}

@keyframes fadeScale {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

#form-container {
  position: absolute;
  width: 90%;
  max-width: 400px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
  pointer-events: none;
}

#form-container.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

.input-group {
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #111;
  color: white;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #8a2be2;
  box-shadow: 0 0 10px rgba(138,43,226,0.6);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: #8a2be2;
  color: white;
  font-size: 1rem;
  opacity: 0.4;
  cursor: not-allowed;
  transition: all 0.3s ease;
}

button.enabled {
  opacity: 1;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(138,43,226,0.8);
}

button:active {
  transform: scale(0.96);
}

.error {
  color: #ff4d4d;
  font-size: 0.8rem;
  display: none;
}

#success {
  position: absolute;
  text-align: center;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.5s ease;
}

#success.active {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>

<body>

<div id="welcome">مرحبًا</div>

<div id="form-container">
  <div class="input-group">
    <input type="text" id="name" placeholder="الاسم">
  </div>

  <div class="input-group">
    <input type="tel" id="phone" placeholder="رقم الهاتف">
    <div id="phone-error" class="error">رقم غير صحيح (11 رقم على الأقل)</div>
  </div>

  <div class="input-group">
    <input type="text" id="address" placeholder="العنوان">
  </div>

  <button id="save" disabled>حفظ</button>
</div>

<div id="success">
  <h2>تم الإرسال بنجاح ✨</h2>
</div>

<script>
const welcome = document.getElementById("welcome");
const form = document.getElementById("form-container");
const success = document.getElementById("success");

const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const saveBtn = document.getElementById("save");
const phoneError = document.getElementById("phone-error");

/* Show form */
setTimeout(() => {
  welcome.style.display = "none";
  form.classList.add("active");
}, 2600);

/* Validation */
function validate() {
  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();
  const address = addressInput.value.trim();

  const validPhone = /^\d{11,}$/.test(phone);

  if (phone && !validPhone) {
    phoneError.style.display = "block";
  } else {
    phoneError.style.display = "none";
  }

  const isValid = name && address && validPhone;

  if (isValid) {
    saveBtn.classList.add("enabled");
    saveBtn.disabled = false;
  } else {
    saveBtn.classList.remove("enabled");
    saveBtn.disabled = true;
  }
}

[nameInput, phoneInput, addressInput].forEach(input => {
  input.addEventListener("input", validate);
});

/* Submit */
saveBtn.addEventListener("click", async () => {
  const data = {
    name: nameInput.value.trim(),
    phone: phoneInput.value.trim(),
    address: addressInput.value.trim()
  };

  saveBtn.innerText = "جارٍ الإرسال...";
  saveBtn.disabled = true;

  try {
    await fetch("https://script.google.com/macros/s/AKfycbz3QPyk9a65_uABv_fNKISMTggIYkISchMiUIRJoYrGlhm0mnkJZ-qwlIQlbCbOGNx_/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    form.style.display = "none";
    success.classList.add("active");

  } catch (e) {
    saveBtn.innerText = "حفظ";
    alert("حدث خطأ، حاول مرة أخرى");
    validate();
  }
});
</script>

</body>
</html>
