<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body {
  height:100vh;
  background:linear-gradient(135deg,#0a0a0a,#1c1c1c);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

#welcome {
  font-size:3.5rem;
  animation:fade 2.5s forwards;
}
@keyframes fade {to{opacity:0;display:none;}}

#form-container {
  position:absolute;
  width:90%;
  max-width:400px;
  opacity:0;
  transform:translateY(20px);
  transition:.5s;
}
#form-container.active {
  opacity:1;
  transform:translateY(0);
}

input {
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:25px;
  background:#8a2be2;
  color:white;
  opacity:.4;
}
button.enabled {opacity:1;}

.error {color:red;font-size:.8rem;display:none;}

#success {
  opacity:0;
  text-align:center;
}
#success.active {opacity:1;}
</style>
</head>

<body>

<div id="welcome">مرحبًا</div>

<div id="form-container">
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <div id="phone-error" class="error">رقم غير صحيح</div>
  <input id="address" placeholder="العنوان">
  <button id="save" disabled>حفظ</button>
</div>

<div id="success">
  <h2>تم الإرسال بنجاح ✨</h2>
</div>

<script>
const form = document.getElementById("form-container");
const success = document.getElementById("success");

const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const saveBtn = document.getElementById("save");
const phoneError = document.getElementById("phone-error");

setTimeout(()=>{
  document.getElementById("welcome").style.display="none";
  form.classList.add("active");
},2500);

/* Validation */
function validate(){
  const validPhone=/^\d{11,}$/.test(phoneInput.value);

  phoneError.style.display = (!validPhone && phoneInput.value) ? "block":"none";

  if(nameInput.value && addressInput.value && validPhone){
    saveBtn.disabled=false;
    saveBtn.classList.add("enabled");
  }else{
    saveBtn.disabled=true;
    saveBtn.classList.remove("enabled");
  }
}

[nameInput,phoneInput,addressInput].forEach(i=>i.addEventListener("input",validate));

/* Submit */
saveBtn.onclick = async ()=>{
  saveBtn.innerText="جارٍ الإرسال...";
  saveBtn.disabled=true;

  try{
    const res = await fetch("https://script.google.com/macros/s/AKfycbwpXAABg74Gf_KOxp6K0o1C0dY3WCzKTvC99XUDt5N_GYtFa9gW_aTwNVJBXTgNQdWS/exec",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name:nameInput.value,
        phone:phoneInput.value,
        address:addressInput.value
      })
    });

    const data = await res.json();

    if(data.status==="success"){
      form.style.display="none";
      success.classList.add("active");
    }else{
      throw new Error();
    }

  }catch(err){
    alert("فشل الإرسال ❌");
    saveBtn.innerText="حفظ";
    validate();
  }
};
</script>

</body>
</html>
