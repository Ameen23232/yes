<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام العملاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cairo';
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.screen {
  display:none;
  width:90%;
  max-width:420px;
  text-align:center;
}

.active {display:block;}

h2 {font-size:26px;font-weight:700;}
h3 {font-size:22px;font-weight:600;}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  background:#1c1c1c;
  color:white;
  font-size:16px;
}

button {
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:16px;
  background:#8a2be2;
  color:white;
  font-size:17px;
  font-weight:600;
  cursor:pointer;
}

#statusBox {
  margin-top:25px;
  font-size:22px;
  font-weight:700;
}
</style>
</head>

<body>

<!-- الرئيسية -->
<div id="home" class="screen active">
  <h2>👋 مرحبًا</h2>
  <button onclick="go('add')">➕ إضافة بيانات</button>
  <button onclick="go('search')">🔍 البحث</button>
</div>

<!-- إضافة -->
<div id="add" class="screen">
  <h3>إضافة عميل</h3>
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="address" placeholder="العنوان">
  <button onclick="save()">حفظ</button>
  <button onclick="go('home')">رجوع</button>
</div>

<!-- نجاح -->
<div id="success" class="screen">
  <h2>تم الإرسال ✅</h2>
  <button onclick="location.reload()">إدخال جديد</button>
</div>

<!-- البحث -->
<div id="search" class="screen">
  <h3>بحث برقم الهاتف</h3>

  <input id="searchPhone" placeholder="رقم الهاتف">
  <button onclick="find()">بحث</button>

  <div id="statusBox"></div>

  <button id="editBtn" style="display:none;" onclick="askPassword()">تعديل الحالة</button>

  <!-- كلمة المرور -->
  <div id="passwordBox" style="display:none;">
    <input id="password" type="password" placeholder="كلمة المرور">
    <button onclick="checkPassword()">تأكيد</button>
  </div>

  <!-- التعديل -->
  <div id="editArea" style="display:none;">
    <input id="newStatus" placeholder="اكتب الحالة">
    <button onclick="updateStatus()">حفظ التعديل</button>
  </div>

  <button onclick="go('home')">رجوع</button>
</div>

<script>
const API = "PUT_YOUR_API_LINK_HERE";

/* التنقل */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* إضافة */
async function save(){
  const data = {
    name: name.value,
    phone: phone.value,
    address: address.value
  };

  await fetch(API,{method:"POST",mode:"no-cors",body:JSON.stringify(data)});
  go("success");
}

/* البحث */
let currentRow=null;

async function find(){
  const phoneVal = searchPhone.value;
  const box = document.getElementById("statusBox");

  if(!phoneVal){
    box.innerHTML="⚠️ اكتب رقم";
    return;
  }

  const res = await fetch(API+"?phone="+phoneVal);
  const data = await res.json();

  if(data.error){
    box.innerHTML="❌ غير موجود";
    editBtn.style.display="none";
    return;
  }

  currentRow = data.row;

  box.innerHTML = data.status ? "📦 "+data.status : "لا توجد حالة";

  document.getElementById("editBtn").style.display="block";
}

/* كلمة المرور */
function askPassword(){
  document.getElementById("passwordBox").style.display="block";
}

function checkPassword(){
  if(password.value==="Admin"){
    passwordBox.style.display="none";
    editArea.style.display="block";
  }else{
    alert("❌ كلمة المرور خطأ");
  }
}

/* تحديث */
async function updateStatus(){
  await fetch(API,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      update:true,
      row:currentRow,
      status:newStatus.value
    })
  });

  alert("تم التحديث ✅");
  location.reload();
}
</script>

</body>
</html>
