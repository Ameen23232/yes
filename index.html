<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الشحنات</title>
    <style>
        /* تنسيقات الصفحة */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f2f2f7; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            max-width: 450px; 
            width: 90%; 
            padding: 25px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 20px; }
        input, select, button { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            font-size: 16px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        input:focus, select:focus { border-color: #007aff; outline: none; }
        button { 
            background: #007aff; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 17px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not- cottonseed; }
        .green { background: #34c759 !important; }
        #recaptcha-container { margin: 15px 0; display: flex; justify-content: center; }
        .message { text-align: center; margin-top: 15px; font-weight: bold; color: #007aff; min-height: 24px; }
        p.hint { text-align: center; font-size: 13px; color: #8e8e93; margin-top: -5px; }
    </style>
</head>
<body>

<div class="container" id="loginDiv">
    <h2>تسجيل الدخول</h2>
    <p class="hint">أدخل رقم هاتفك بالصيغة الدولية (مثل +2012...)</p>
    <input type="tel" id="phone" placeholder="+201234567890">
    <div id="recaptcha-container"></div>
    <button id="sendBtn">إرسال رمز التحقق</button>
</div>

<div class="container" id="otpDiv" style="display:none;">
    <h2>تأكيد الرمز</h2>
    <p class="hint">أدخل الرمز المرسل إلى هاتفك</p>
    <input type="text" id="otpCode" placeholder="000000">
    <button id="verifyBtn">تأكيد الرمز</button>
</div>

<div class="container" id="formDiv" style="display:none;">
    <h2>بيانات الشحنة</h2>
    <input type="text" id="name" placeholder="اسم المستلم">
    <input type="tel" id="phone1" placeholder="رقم الهاتف الأساسي">
    <input type="tel" id="phone2" placeholder="رقم هاتف بديل">
    <select id="gov">
        <option value="">اختر المحافظة</option>
        <option value="Giza">الجيزة</option>
        <option value="Cairo">القاهرة</option>
        <option value="Qalyubia">القليوبية</option>
    </select>
    <select id="city">
        <option value="">اختر المدينة أولاً</option>
    </select>
    <input type="text" id="area" placeholder="المنطقة / الحي">
    <input type="text" id="street" placeholder="العنوان بالتفصيل">
    <input type="number" id="weight" placeholder="الوزن (كجم) - بحد أقصى 30">
    <input type="number" id="price" placeholder="المبلغ المطلوب تحصيله">
    <select id="type">
        <option value="normal">تسليم عادي</option>
        <option value="exchange">طلب استبدال</option>
    </select>
    <button id="regBtn">حفظ الشحنة</button>
    <div class="message" id="msg"></div>
    <button id="trackBtn" class="green" style="display:none;">تتبع حالة الطلب</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDldtKeMmupSmdVpnfq_nnh2ojghsZwtNI",
        authDomain: "otp1-987a0.firebaseapp.com",
        projectId: "otp1-987a0",
        storageBucket: "otp1-987a0.appspot.com",
        messagingSenderId: "269070576901",
        appId: "1:269070576901:web:cc6c4f5da19158f96b5b6c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = 'ar'; // تعيين لغة الرسائل للعربية

    let confirmationResult;
    let currentShipmentId = null;

    // تهيئة الـ reCAPTCHA
    window.onload = function() {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal',
            'callback': (response) => {
                console.log("تم التحقق من المستخدم بنجاح");
            }
        });
    };

    // وظيفة إرسال الرمز
    async function sendOTP() {
        const phone = document.getElementById("phone").value.trim();
        if (!phone.startsWith("+")) {
            alert("يرجى إدخال الرقم بالصيغة الدولية (مثال: +2010...)");
            return;
        }

        const btn = document.getElementById("sendBtn");
        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        try {
            confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('otpDiv').style.display = 'block';
        } catch (error) {
            console.error(error);
            alert("خطأ: " + error.message);
            window.recaptchaVerifier.render(); // إعادة تحميل الكابتشا
            btn.disabled = false;
            btn.innerText = "إرسال رمز التحقق";
        }
    }

    // وظيفة التأكد من الرمز
    async function verifyOTP() {
        const code = document.getElementById('otpCode').value;
        const btn = document.getElementById("verifyBtn");
        
        try {
            btn.disabled = true;
            await confirmationResult.confirm(code);
            document.getElementById('otpDiv').style.display = 'none';
            document.getElementById('formDiv').style.display = 'block';
        } catch (error) {
            alert("الكود الذي أدخلته غير صحيح");
            btn.disabled = false;
        }
    }

    // إدارة المدن والمحافظات
    const cities = {
        "Giza": ["6 أكتوبر", "الدقي", "الهرم", "المهندسين"],
        "Cairo": ["مدينة نصر", "مصر الجديدة", "المعادي", "التجمع الخامس"],
        "Qalyubia": ["شبرا الخيمة", "بنها", "القليوب"]
    };

    function updateCities() {
        const gov = document.getElementById('gov').value;
        const citySelect = document.getElementById('city');
        citySelect.innerHTML = '<option value="">اختر المدينة</option>';
        if (cities[gov]) {
            cities[gov].forEach(c => {
                let opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                citySelect.appendChild(opt);
            });
        }
    }

    // حفظ البيانات في Google Sheets
    async function saveShipment() {
        const msg = document.getElementById('msg');
        const btn = document.getElementById('regBtn');
        
        const data = {
            name: document.getElementById('name').value,
            phone1: document.getElementById('phone1').value,
            phone2: document.getElementById('phone2').value,
            gov: document.getElementById('gov').value,
            city: document.getElementById('city').value,
            area: document.getElementById('area').value,
            street: document.getElementById('street').value,
            weight: document.getElementById('weight').value,
            price: document.getElementById('price').value,
            type: document.getElementById('type').value
        };

        if(!data.name || !data.gov || !data.city) {
            alert("يرجى ملء البيانات الأساسية");
            return;
        }

        btn.disabled = true;
        msg.innerText = "جاري الحفظ...";

        try {
            const response = await fetch("https://script.google.com/macros/s/AKfycbzIEDw1NWejQAZEC-ANVI4YMrATsCTSYj8hyz7qyolUEGJyUvnFa27Ud7sN6cdQaFw5/exec", {
                method: "POST",
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if(result.status === "success") {
                currentShipmentId = result.shipmentId;
                msg.innerText = "✅ تم التسجيل بنجاح. قيد المراجعة.";
                pollStatus(); // ابدأ فحص الحالة
            }
        } catch (err) {
            msg.innerText = "خطأ في الاتصال بالخادم";
            btn.disabled = false;
        }
    }

    // فحص حالة الشحنة
    function pollStatus() {
        if (!currentShipmentId) return;
        fetch("https://script.google.com/macros/s/AKfycbyf0bNSeG6RW_A22nRHwJczj9lN_IaG1Sqs6Vq5Z0YGEdTtoZHtkLYgpHigOiatCOeA/exec")
        .then(r => r.json())
        .then(data => {
            const found = data.find(s => s[0] === currentShipmentId);
            if (found && found[1]) {
                document.getElementById('msg').innerText = "🎉 تمت الموافقة على طلبك!";
                document.getElementById('trackBtn').style.display = 'block';
            } else {
                setTimeout(pollStatus, 8000); // إعادة الفحص كل 8 ثوانٍ
            }
        });
    }

    // ربط الأزرار بالوظائف (لأننا نستخدم type="module")
    document.getElementById('sendBtn').onclick = sendOTP;
    document.getElementById('verifyBtn').onclick = verifyOTP;
    document.getElementById('regBtn').onclick = saveShipment;
    document.getElementById('gov').onchange = updateCities;
    document.getElementById('trackBtn').onclick = () => alert("جاري فتح صفحة التتبع...");

</script>
</body>
</html>
